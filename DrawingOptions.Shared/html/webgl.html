<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>WebGL Line Rendering</title>
    <style>
        .mapLayer {
            border: 3px solid green;
            position: absolute;
            left: 0px;
            top: 0px;
        }
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
<canvas class="mapLayer" id="drawCanvas">WebGL Canvas</canvas>

<script type="text/javascript">
    var actualWidth = 100;
    var actualHeight = 100;
    const canvas = document.getElementById("drawCanvas");
    const gl = canvas.getContext("webgl", {
        alpha: true,
        antialias: false,  // Disable for performance
        depth: false,
        stencil: false,
        preserveDrawingBuffer: false
    }) || canvas.getContext("experimental-webgl");

    if (!gl) {
        alert("WebGL not supported!");
        throw new Error("WebGL not supported");
    }

    // Vertex shader - transforms positions and passes color to fragment shader
    const vertexShaderSource = `
        attribute vec2 a_position;
        attribute vec4 a_color;
        uniform vec2 u_resolution;
        varying vec4 v_color;

        void main() {
            // Convert from pixel coordinates to clip space (-1 to 1)
            vec2 clipSpace = (a_position / u_resolution) * 2.0 - 1.0;
            gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
            v_color = a_color;
        }
    `;

    // Fragment shader - applies color with alpha blending
    const fragmentShaderSource = `
        precision mediump float;
        varying vec4 v_color;

        void main() {
            gl_FragColor = v_color;
        }
    `;

    // Compile shader helper
    function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader compile error:', gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
        }
        return shader;
    }

    // Create and link program
    function createProgram(gl, vertexShader, fragmentShader) {
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
            gl.deleteProgram(program);
            return null;
        }
        return program;
    }

    // Setup WebGL program
    const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
    const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
    const program = createProgram(gl, vertexShader, fragmentShader);

    // Get attribute and uniform locations
    const positionLocation = gl.getAttribLocation(program, "a_position");
    const colorLocation = gl.getAttribLocation(program, "a_color");
    const resolutionLocation = gl.getUniformLocation(program, "u_resolution");

    // Create buffers
    const positionBuffer = gl.createBuffer();
    const colorBuffer = gl.createBuffer();

    // Pre-allocate arrays for line data (2 vertices per line, 5000 lines)
    const maxLines = 5000;
    const positions = new Float32Array(maxLines * 4); // x1,y1,x2,y2 per line
    const colors = new Float32Array(maxLines * 8);    // r,g,b,a per vertex (2 vertices per line)

    // ONE-TIME SETUP: Configure WebGL state and buffers
    function setupWebGL() {
        // Use our shader program
        gl.useProgram(program);

        // Enable blending for alpha support (DO ONCE)
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        // Setup position buffer (DO ONCE)
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // Setup color buffer (DO ONCE)
        gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, colors, gl.DYNAMIC_DRAW);
        gl.enableVertexAttribArray(colorLocation);
        gl.vertexAttribPointer(colorLocation, 4, gl.FLOAT, false, 0, 0);
    }

    function resizeCanvas() {
        actualWidth = window.innerWidth - 10;
        actualHeight = window.innerHeight - 10;
        canvas.width = actualWidth;
        canvas.height = actualHeight;
        gl.viewport(0, 0, actualWidth, actualHeight);
        
        // Update resolution uniform (program must be active first)
        gl.useProgram(program);
        gl.uniform2f(resolutionLocation, actualWidth, actualHeight);
    }

    // Generate random line data (called once per frame)
    function generateRandomLines() {
        for (let i = 0; i < maxLines; i++) {
            const idx = i * 4;
            const colorIdx = i * 8;

            // Random positions
            positions[idx] = Math.random() * actualWidth;
            positions[idx + 1] = Math.random() * actualHeight;
            positions[idx + 2] = Math.random() * actualWidth;
            positions[idx + 3] = Math.random() * actualHeight;

            // Random color (same for both vertices of the line)
            const r = Math.random();
            const g = Math.random();
            const b = Math.random();
            const a = Math.random();

            // Vertex 1 color
            colors[colorIdx] = r;
            colors[colorIdx + 1] = g;
            colors[colorIdx + 2] = b;
            colors[colorIdx + 3] = a;

            // Vertex 2 color (same as vertex 1)
            colors[colorIdx + 4] = r;
            colors[colorIdx + 5] = g;
            colors[colorIdx + 6] = b;
            colors[colorIdx + 7] = a;
        }
    }

    function draw() {
        // Generate new random lines each frame
        generateRandomLines();

        // Update position buffer (only upload new data, attributes already configured)
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferSubData(gl.ARRAY_BUFFER, 0, positions);

        // Update color buffer
        gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
        gl.bufferSubData(gl.ARRAY_BUFFER, 0, colors);

        // Clear the canvas
        gl.clearColor(0, 0, 0, 0);
        gl.clear(gl.COLOR_BUFFER_BIT);

        // Draw all lines (single draw call)
        gl.drawArrays(gl.LINES, 0, maxLines * 2);

        // Notify host
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage('Draw Called');
        }

        window.requestAnimationFrame(draw);
    }

    // CORRECT INITIALIZATION ORDER
    window.onresize = resizeCanvas;
    setupWebGL();      // ✅ Setup program FIRST
    resizeCanvas();    // ✅ Now safe to set uniforms
    draw();
</script>
</body>
</html>
